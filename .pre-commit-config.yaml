
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-toml
  - id: check-yaml
    exclude: template.yaml
  - id: debug-statements
  - id: end-of-file-fixer
    exclude: WHEEL
    exclude_types: [json]
  - id: forbid-new-submodules
  - id: trailing-whitespace
    exclude: .patch
    exclude_types: [json]

- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    - id: ruff
      args: ["--fix", "--show-fixes"]
    - id: ruff-format

- repo: https://github.com/adamchainz/blacken-docs
  rev: "1.20.0"
  hooks:
  - id: blacken-docs
    additional_dependencies:
    - black==22.3.0

- repo: https://github.com/pre-commit/pygrep-hooks
  rev: "v1.10.0"
  hooks:
    - id: rst-backticks
    - id: rst-directive-colons
    - id: rst-inline-touching-normal

- repo: https://github.com/rstcheck/rstcheck
  rev: v6.2.5
  hooks:
  - id: rstcheck
    additional_dependencies: [sphinx]
    args: ["--ignore-directives=doctest,testsetup,todo,automodule","--ignore-substitutions=release", "--report-level=error"]

- repo: https://github.com/PyCQA/flake8
  rev: 7.3.0
  hooks:
  - id: flake8
    files: \.rst$
    additional_dependencies: [
        'flake8-rst==0.8.0',
        'flake8-bugbear==25.11.29',
        'flake8-logging-format==0.9.0',
        'flake8-implicit-str-concat==0.6.0',
    ]

# We use the Python version instead of the original version which seems to require Docker
# https://github.com/koalaman/shellcheck-precommit
- repo: https://github.com/shellcheck-py/shellcheck-py
  rev: v0.11.0.1
  hooks:
    - id: shellcheck
      name: shellcheck
      args: ["--severity=warning"]
      stages: [manual]

- repo: https://github.com/PyCQA/doc8
  rev: v2.0.0
  hooks:
    - id: doc8
      args: ["--ignore=D001"]  # ignore line length
      stages: [manual]

- repo: https://github.com/sirosen/check-jsonschema
  rev: 0.37.0
  hooks:
    - id: check-jsonschema
      name: "Check GitHub Workflows"
      files: ^\.github/workflows/
      types: [yaml]
      args: ["--schemafile", "https://json.schemastore.org/github-workflow"]
      stages: [manual]

- repo: https://github.com/ariebovenberg/slotscheck
  rev: v0.19.1
  hooks:
  - id: slotscheck
    files: \.py$
    exclude: "^(bindings/python/test|bindings/python)/"
    stages: [manual]
    args: ["--no-strict-imports"]

- repo: https://github.com/MarcoGorelli/cython-lint
  rev: v0.19.0
  hooks:
  - id: cython-lint
    args: ["--no-pycodestyle"]

- repo: https://github.com/codespell-project/codespell
  rev: "v2.4.2"
  hooks:
  - id: codespell
    # Examples of errors or updates to justify the exceptions:
    # - test/test_on_demand_csfle.py:44: FLE ==> FILE
    # - test/test_bson.py:1043: fo ==> of, for, to, do, go
    # - test/bson_corpus/decimal128-4.json:98: Infinit ==> Infinite
    # - test/test_bson.py:267: isnt ==> isn't
    # - test/versioned-api/crud-api-version-1-strict.json:514: nin ==> inn, min, bin, nine
    # - test/test_client.py:188: te ==> the, be, we, to
    args: ["-L", "fle,fo,infinit,isnt,nin,te"]
